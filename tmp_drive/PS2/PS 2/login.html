<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authenticator - WardWatch</title>
    <!-- Premium External Fonts -->
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body class="page-public">
    <div class="auth-page">
        <!-- Breathtaking Background Gradient -->
        <div class="auth-bg-effect"></div>

        <div class="auth-card">
            <div class="auth-header">
                <div style="
                    background: white;
                    padding: 16px 24px;
                    border-radius: 16px;
                    margin: 0 auto 20px;
                    display: inline-flex;
                    justify-content: center;
                    box-shadow: 0 0 30px rgba(59,130,246,0.35);
                    transition: 0.3s ease;">
                    <video autoplay muted loop playsinline style="width: 220px; height: auto; border-radius: 12px;">
                        <source src="WardWatch.mp4" type="video/mp4">
                    </video>
                </div>

                <form id="auth-form" onsubmit="handleLogin(event)" style="display:flex; flex-direction:column; gap:24px;">
                    <div class="form-field">
                        <label class="form-label">Email Address</label>
                        <input id="auth-email" type="email" class="form-input" placeholder="name@hospital.org" required>
                    </div>

                    <div class="form-field">
                        <label class="form-label">Password</label>
                        <input id="auth-password" type="password" class="form-input" placeholder="Enter your password" required>
                    </div>

                    <div id="auth-error" class="auth-error" style="display:none; color:#f87171; text-align:center; margin-bottom:16px;"></div>

                    <button type="submit" class="btn btn-primary" id="auth-submit-btn"
                        style="padding: 16px; font-size: 1.05rem; margin-top: 8px;">
                        Sign In <i class="fa-solid fa-arrow-right" style="margin-left: 8px;"></i>
                    </button>
                </form>
            </div>
        </div>
    </div>

    <script src="firebase-auth.js"></script>
</body>
</html>
